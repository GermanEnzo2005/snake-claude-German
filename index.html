<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#050a0e;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:'Press Start 2P',monospace;
}
#ag{display:flex;flex-direction:column;align-items:center;padding:1rem;gap:0;}
#acv{display:block;border-radius:4px;width:100%;max-width:420px;height:auto;}
#adpad{display:none;flex-direction:column;align-items:center;gap:6px;margin-top:12px;}
.adrow{display:flex;gap:6px;}
.adb{
  width:54px;height:54px;
  border:1px solid rgba(0,255,136,0.4);
  border-radius:4px;
  background:rgba(0,255,136,0.07);
  color:#00ff88;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  user-select:none;font-family:monospace;
  -webkit-tap-highlight-color:transparent;
  transition:background .1s;
}
.adb:active{background:rgba(0,255,136,0.22);}
@media(pointer:coarse){#adpad{display:flex;}}
@media(max-width:460px){#acv{border-radius:2px;}}
</style>
</head>
<body>
<div id="ag">
  <canvas id="acv" width="420" height="520"></canvas>
  <div id="adpad">
    <div class="adrow"><div class="adb" id="adu">▲</div></div>
    <div class="adrow">
      <div class="adb" id="adl">◄</div>
      <div class="adb" id="add">▼</div>
      <div class="adb" id="adr">►</div>
    </div>
  </div>
</div>

<script>
const cv=document.getElementById('acv'),cx=cv.getContext('2d');
const CW=420,CH=520,GX=10,GY=88,GS=20,COLS=20,ROWS=20,GW=400,GH=400;
let state='intro',snake,dir,nd,food,bonus,bTimer,running=false,raf,lastT=0,acc=0;
let score=0,best=0,level=1,spd=7,particles=[],trails=[],stars=[];
let flashA=0,shake=0,sx=0,sy=0,combo=0,cTimer=0,hiNew=false,glowT=0,scanY=0;

for(let i=0;i<40;i++) stars.push({x:Math.random()*CW,y:Math.random()*GY*.9,s:Math.random()*1.2+.3,sp:Math.random()*.25+.05});

function rnd(n){return Math.floor(Math.random()*n);}
function px(x){return x*GS+GX;}
function py(y){return y*GS+GY;}

function placeFood(){
  let p;
  do{p={x:rnd(COLS),y:rnd(ROWS)};}
  while(snake.some(s=>s.x===p.x&&s.y===p.y)||(bonus&&p.x===bonus.x&&p.y===bonus.y));
  food=p;
}
function placeBonus(){
  if(bonus||Math.random()>.25)return;
  let p;
  do{p={x:rnd(COLS),y:rnd(ROWS)};}
  while(snake.some(s=>s.x===p.x&&s.y===p.y)||p.x===food.x&&p.y===food.y);
  bonus=p;bTimer=200;
}
function spawnP(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;
    particles.push({x:x*GS+GX+GS/2,y:y*GS+GY+GS/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:2+Math.random()*3,life:1,col});
  }
}

function init(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};nd={x:1,y:0};
  score=0;level=1;spd=7;combo=0;cTimer=0;hiNew=false;
  particles=[];trails=[];bonus=null;bTimer=0;flashA=0;shake=0;
  placeFood();state='play';running=true;lastT=0;acc=0;
  raf=requestAnimationFrame(loop);
}

function loop(ts){
  raf=requestAnimationFrame(loop);
  const dt=Math.min(ts-lastT,80);lastT=ts;glowT=ts;
  stars.forEach(s=>{s.y+=s.sp;if(s.y>GY*.95)s.y=0;});
  if(state==='play'&&running){
    acc+=dt;
    const step=1000/spd;
    while(acc>=step){acc-=step;tick();}
  }
  if(shake>0){shake*=.7;sx=(Math.random()-.5)*shake;sy=(Math.random()-.5)*shake;}else{sx=0;sy=0;}
  if(flashA>0)flashA*=.8;
  if(cTimer>0)cTimer--;
  particles=particles.filter(p=>p.life>.05);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.vx*=.95;p.life*=.9;p.r*=.94;});
  if(bTimer>0){bTimer--;if(bTimer===0)bonus=null;}
  scanY=(scanY+1)%GH;
  draw();
}

function tick(){
  trails.push({x:snake[0].x*GS+GX+GS/2,y:snake[0].y*GS+GY+GS/2,life:.5});
  trails=trails.filter(t=>t.life>.03);
  trails.forEach(t=>t.life*=.8);
  dir={...nd};
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
    gameOver();return;
  }
  snake.unshift(head);
  let ate=false;
  if(head.x===food.x&&head.y===food.y){
    combo++;cTimer=65;
    score+=combo>=4?3:combo>=2?2:1;
    if(score>best){best=score;hiNew=true;}
    spawnP(head.x,head.y,'#00ff88',combo>=3?16:10);
    flashA=combo>=3?.22:.12;
    if(score%5===0&&spd<22){level++;spd=Math.min(22,spd+1.8);}
    placeFood();placeBonus();ate=true;
  } else if(bonus&&head.x===bonus.x&&head.y===bonus.y){
    score+=5;if(score>best){best=score;hiNew=true;}
    spawnP(head.x,head.y,'#ffcc00',20);
    flashA=.3;combo+=3;cTimer=65;bonus=null;
    for(let i=0;i<3;i++)snake.push({...snake[snake.length-1]});
    ate=true;
  }
  if(!ate)snake.pop();
}

function draw(){
  cx.fillStyle='#050a0e';cx.fillRect(0,0,CW,CH);

  cx.fillStyle='rgba(255,255,255,0.5)';
  stars.forEach(s=>{cx.fillRect(s.x,s.y,s.s,s.s);});

  cx.fillStyle='rgba(0,40,20,0.5)';cx.fillRect(0,0,CW,GY-1);
  cx.fillStyle='rgba(0,255,136,0.2)';cx.fillRect(0,GY-1,CW,1);

  cx.fillStyle='#00ff88';
  cx.font=`bold 12px 'Press Start 2P'`;cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('SNAKE',CW/2,20);

  [{label:'SCORE',val:score,x:CW*.18},{label:'BEST',val:best,x:CW*.5},{label:'LVL',val:level,x:CW*.82}].forEach(h=>{
    cx.fillStyle='rgba(0,255,136,0.45)';cx.font=`6px 'Press Start 2P'`;cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(h.label,h.x,44);
    cx.fillStyle='#ffffff';cx.font=`bold 10px 'Press Start 2P'`;
    cx.fillText(h.val,h.x,59);
  });

  cx.fillStyle='rgba(0,255,136,0.1)';cx.fillRect(GX,75,GW,5);
  const spPct=Math.min(1,(spd-7)/15);
  cx.fillStyle=spPct<.4?'#00ff88':spPct<.7?'#ffcc00':'#ff4466';
  cx.fillRect(GX,75,GW*spPct,5);
  cx.fillStyle='rgba(255,255,255,0.25)';cx.font='5px monospace';cx.textAlign='left';cx.textBaseline='top';
  cx.fillText('SPD',GX,67);

  cx.save();cx.translate(sx,sy);

  cx.strokeStyle='rgba(0,255,136,0.4)';cx.lineWidth=1;
  cx.strokeRect(GX,GY,GW,GH);

  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if((r+c)%2===0){cx.fillStyle='rgba(0,255,136,0.018)';cx.fillRect(px(c),py(r),GS,GS);}
  }
  cx.strokeStyle='rgba(0,255,136,0.05)';cx.lineWidth=.5;
  for(let i=0;i<=COLS;i+=4){cx.beginPath();cx.moveTo(GX+i*GS,GY);cx.lineTo(GX+i*GS,GY+GH);cx.stroke();}
  for(let i=0;i<=ROWS;i+=4){cx.beginPath();cx.moveTo(GX,GY+i*GS);cx.lineTo(GX+GW,GY+i*GS);cx.stroke();}

  cx.fillStyle='rgba(0,255,136,0.04)';cx.fillRect(GX,GY+scanY,GW,3);

  if(flashA>.01){cx.fillStyle=`rgba(0,255,136,${flashA*.5})`;cx.fillRect(GX,GY,GW,GH);}

  trails.forEach(t=>{
    cx.globalAlpha=t.life*.4;
    cx.fillStyle='#00ff88';
    cx.fillRect(t.x-3,t.y-3,6,6);
  });
  cx.globalAlpha=1;

  if(bonus){
    const bp=.5+.5*Math.sin(glowT/200);
    cx.fillStyle='#ffcc00';
    cx.beginPath();cx.arc(px(bonus.x)+GS/2,py(bonus.y)+GS/2,GS/2-1+bp,0,Math.PI*2);cx.fill();
    cx.fillStyle='#050a0e';cx.font=`bold 7px 'Press Start 2P'`;cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('+5',px(bonus.x)+GS/2,py(bonus.y)+GS/2);
    const ang=(bTimer/200)*Math.PI*2;
    cx.strokeStyle='rgba(255,204,0,.6)';cx.lineWidth=2;
    cx.beginPath();cx.arc(px(bonus.x)+GS/2,py(bonus.y)+GS/2,GS/2+4,-Math.PI/2,-Math.PI/2+ang);cx.stroke();
  }

  if(state==='play'||state==='over'){
    snake.forEach((s,i)=>{
      const t=1-i/snake.length;
      if(i===0){
        cx.fillStyle='#00ff88';
        cx.beginPath();cx.roundRect(px(s.x)+1,py(s.y)+1,GS-2,GS-2,5);cx.fill();
        cx.fillStyle='rgba(255,255,255,0.25)';
        cx.fillRect(px(s.x)+3,py(s.y)+2,GS-10,3);
        const ex=dir.x,ey=dir.y;
        [{x:-ey,y:ex},{x:ey,y:-ex}].forEach(e=>{
          const ex2=px(s.x)+GS/2+ex*5+e.x*4,ey2=py(s.y)+GS/2+ey*5+e.y*4;
          cx.fillStyle='#050a0e';cx.fillRect(ex2-2,ey2-2,4,4);
          cx.fillStyle='#fff';cx.fillRect(ex2-1,ey2-1,2,2);
        });
        if(Math.sin(glowT/120)>.3){
          cx.strokeStyle='#ff4466';cx.lineWidth=1.5;
          const tx=px(s.x)+GS/2+ex*11,ty=py(s.y)+GS/2+ey*11;
          cx.beginPath();cx.moveTo(px(s.x)+GS/2+ex*8,py(s.y)+GS/2+ey*8);cx.lineTo(tx,ty);cx.stroke();
          cx.beginPath();cx.moveTo(tx,ty);cx.lineTo(tx-ey*3+ex*3,ty+ex*3+ey*3);cx.stroke();
          cx.beginPath();cx.moveTo(tx,ty);cx.lineTo(tx+ey*3+ex*3,ty-ex*3+ey*3);cx.stroke();
        }
      } else {
        cx.fillStyle=`hsl(145,85%,${Math.round(28+t*42)}%)`;
        cx.beginPath();cx.roundRect(px(s.x)+2,py(s.y)+2,GS-4,GS-4,3);cx.fill();
        if(i%3===1){cx.fillStyle='rgba(255,255,255,0.12)';cx.fillRect(px(s.x)+4,py(s.y)+3,GS-12,3);}
      }
    });
  }

  const fp=.5+.5*Math.sin(glowT/280);
  cx.fillStyle='#ff4466';
  cx.beginPath();cx.arc(px(food.x)+GS/2,py(food.y)+GS/2,GS/2-2+fp*.8,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(255,255,255,.45)';cx.beginPath();cx.arc(px(food.x)+GS/2-2,py(food.y)+GS/2-3,2.5,0,Math.PI*2);cx.fill();
  cx.fillStyle='#22c55e';cx.beginPath();cx.ellipse(px(food.x)+GS/2+2,py(food.y)+GS/2-GS/2+2,3,2,.5,0,Math.PI*2);cx.fill();

  particles.forEach(p=>{
    cx.globalAlpha=p.life;
    cx.fillStyle=p.col;
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();
  });
  cx.globalAlpha=1;

  if(cTimer>0&&combo>=2){
    const ca=Math.min(1,cTimer/15);
    cx.globalAlpha=ca;
    cx.fillStyle='rgba(0,0,0,.75)';cx.beginPath();cx.roundRect(CW/2-50,GY+8,100,24,12);cx.fill();
    cx.strokeStyle='rgba(255,204,0,.5)';cx.lineWidth=1;cx.stroke();
    cx.fillStyle='#ffcc00';cx.font=`bold 7px 'Press Start 2P'`;cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(`x${combo} COMBO!`,CW/2,GY+20);
    cx.globalAlpha=1;
  }

  cx.restore();

  if(state==='intro'){
    cx.fillStyle='rgba(5,10,14,0.88)';cx.fillRect(0,0,CW,CH);
    const gp=.5+.5*Math.sin(glowT/600);
    cx.fillStyle=`rgba(0,255,136,${.85+gp*.15})`;
    cx.font=`bold 18px 'Press Start 2P'`;cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('SNAKE',CW/2,CH/2-65);
    [0,1,2,3,4].forEach(i=>{
      const bx=CW/2+(i-2)*GS*1.2;
      cx.fillStyle=i===0?'#00ff88':`hsl(145,80%,${50-i*7}%)`;
      cx.beginPath();cx.roundRect(bx-8,CH/2-34,16,16,i===0?5:3);cx.fill();
    });
    cx.fillStyle='rgba(0,255,136,0.55)';cx.font=`6px 'Press Start 2P'`;
    cx.fillText('FLECHAS / WASD',CW/2,CH/2+14);
    cx.fillText('PARA MOVER',CW/2,CH/2+28);
    if(Math.sin(glowT/450)>.1){
      cx.fillStyle='#ffffff';cx.font=`7px 'Press Start 2P'`;
      cx.fillText('PRESIONA ESPACIO',CW/2,CH/2+54);
    }
    if(best>0){cx.fillStyle='rgba(0,255,136,0.3)';cx.font=`5px 'Press Start 2P'`;cx.fillText(`MEJOR: ${best}`,CW/2,CH/2+76);}
    return;
  }

  if(state==='over'){
    cx.fillStyle='rgba(5,10,14,0.82)';cx.fillRect(GX,GY,GW,GH);
    cx.fillStyle='#ff4466';cx.font=`bold 10px 'Press Start 2P'`;cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('GAME OVER',CW/2,GY+GH/2-48);
    cx.fillStyle='#ffffff';cx.font=`8px 'Press Start 2P'`;
    cx.fillText(`SCORE: ${score}`,CW/2,GY+GH/2-18);
    if(hiNew){cx.fillStyle='#ffcc00';cx.font=`7px 'Press Start 2P'`;cx.fillText('NEW RECORD!',CW/2,GY+GH/2+8);}
    if(Math.sin(glowT/400)>.1){cx.fillStyle='rgba(0,255,136,0.85)';cx.font=`6px 'Press Start 2P'`;cx.fillText('PRESS SPACE',CW/2,GY+GH/2+36);}
  }
}

function gameOver(){running=false;state='over';shake=10;}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();if(state==='intro'||state==='over')init();return;}
  if(state!=='play')return;
  const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
           KeyW:{x:0,y:-1},KeyS:{x:0,y:1},KeyA:{x:-1,y:0},KeyD:{x:1,y:0}};
  const d=m[e.code];
  if(d&&!(d.x===-dir.x&&d.y===-dir.y)){nd=d;e.preventDefault();}
});

function dpadDir(dx,dy){
  if(state==='intro'||state==='over'){init();return;}
  if(!(dx===-dir.x&&dy===-dir.y))nd={x:dx,y:dy};
}
document.getElementById('adu').addEventListener('click',()=>dpadDir(0,-1));
document.getElementById('add').addEventListener('click',()=>dpadDir(0,1));
document.getElementById('adl').addEventListener('click',()=>dpadDir(-1,0));
document.getElementById('adr').addEventListener('click',()=>dpadDir(1,0));

raf=requestAnimationFrame(loop);
</script>
</body>
</html>
